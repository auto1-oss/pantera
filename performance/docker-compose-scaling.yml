services:
  postgres:
    image: postgres:17.8-alpine
    environment:
      POSTGRES_USER: pantera
      POSTGRES_PASSWORD: pantera
      POSTGRES_DB: pantera
    tmpfs: [/var/lib/postgresql/data]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantera"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro

  valkey:
    image: valkey/valkey:7-alpine
    command: ["valkey-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Two WireMock instances behind an nginx round-robin load-balancer so the
  # mock upstream can't become the benchmark's binding bottleneck at proxy-heavy
  # ramps (earlier smoke saw WireMock saturate well before the SUT). Pantera
  # sees a single host `mock-upstream:8080`; nginx distributes to two backends.
  mock-upstream-a:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--async-response-enabled=true", "--async-response-threads=200"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  mock-upstream-b:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--async-response-enabled=true", "--async-response-threads=200"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  mock-upstream:
    image: nginx:1.27-alpine
    depends_on:
      mock-upstream-a: { condition: service_started }
      mock-upstream-b: { condition: service_started }
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  pantera-sut:
    image: pantera-bench:local
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_healthy }
      mock-upstream: { condition: service_started }
    environment:
      PANTERA_DB_URL: jdbc:postgresql://postgres:5432/pantera
      PANTERA_DB_USER: pantera
      PANTERA_DB_PASSWORD: pantera
      PANTERA_DB_POOL_MAX: "${SUT_DB_POOL_MAX:-40}"
      PANTERA_DB_POOL_MIN: "10"
      PANTERA_COOLDOWN_ENABLED: "${SUT_COOLDOWN:-true}"
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      JAVA_OPTS: "-Xmx${SUT_XMX:-5120m} -Xms${SUT_XMX:-5120m} -XX:+UseG1GC -XX:MaxGCPauseMillis=300 -XX:MaxDirectMemorySize=2G"
    ports:
      - "8088:8080"
      - "8089:8086"
    deploy:
      resources:
        limits:
          cpus: "${SUT_CPUS:-4}"
          memory: "${SUT_MEM:-8G}"
    volumes:
      - ./pantera-config.yml:/etc/pantera/pantera.yml:ro
      - ./repos:/var/pantera/repo:ro
      - ./secrets:/etc/pantera/secrets:ro
      - ./data:/var/pantera/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/.health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
