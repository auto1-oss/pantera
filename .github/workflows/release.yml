name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pantera
          POSTGRES_PASSWORD: pantera
          POSTGRES_DB: pantera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify version matches POM
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: POM version ($POM_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $POM_VERSION"

      - name: Build test Docker images
        run: cd test_images && ./build.sh

      - name: Compile and test
        run: mvn clean verify -Pitcase -T 1C --fail-at-end
        env:
          POSTGRES_USER: pantera
          POSTGRES_PASSWORD: pantera

      - name: Package JAR with dependencies
        run: mvn package dependency:copy-dependencies -DskipTests -q -pl pantera-main

      - name: Prepare release artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p release-artifacts

          # Copy main JAR
          cp pantera-main/target/pantera-main-${VERSION}.jar release-artifacts/pantera-${VERSION}.jar

          # Create fat archive with all dependencies
          cd pantera-main/target
          tar czf ../../release-artifacts/pantera-${VERSION}-dist.tar.gz \
            pantera-main-${VERSION}.jar dependency/
          cd ../..

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: release-artifacts/
          retention-days: 1

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: pantera-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pantera-ui/package-lock.json

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Type check and lint
        run: |
          npm run type-check
          npm run lint

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Package UI artifact
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd dist
          tar czf ../../pantera-ui-${VERSION}.tar.gz .

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-release
          path: pantera-ui-*.tar.gz
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [build-backend, build-ui]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-release
          path: release/

      - name: Download UI artifacts
        uses: actions/download-artifact@v4
        with:
          name: ui-release
          path: release/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > release-notes.md << 'NOTES'
          ## Pantera ${{ steps.version.outputs.VERSION }}

          ### Release Artifacts

          | Artifact | Description |
          |----------|-------------|
          | `pantera-${VERSION}.jar` | Main application JAR |
          | `pantera-${VERSION}-dist.tar.gz` | Complete distribution (JAR + all dependencies) |
          | `pantera-ui-${VERSION}.tar.gz` | Management UI (static files for nginx) |

          ### Quick Start

          ```bash
          # Extract distribution
          tar xzf pantera-${VERSION}-dist.tar.gz

          # Run
          java -cp pantera-main-${VERSION}.jar:dependency/* \
            com.auto1.pantera.VertxMain \
            --config-file=pantera.yml \
            --port=8080 --api-port=8086
          ```

          ### Docker

          ```bash
          cd pantera-main/docker-compose
          docker compose up -d
          ```

          ### Requirements

          - JDK 21+
          - PostgreSQL 15+
          - Valkey/Redis (optional, for HA)
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pantera v${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'RC') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
          files: |
            release/pantera-${{ steps.version.outputs.VERSION }}.jar
            release/pantera-${{ steps.version.outputs.VERSION }}-dist.tar.gz
            release/pantera-ui-${{ steps.version.outputs.VERSION }}.tar.gz
