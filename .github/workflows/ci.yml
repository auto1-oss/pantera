name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pantera
          POSTGRES_PASSWORD: pantera
          POSTGRES_DB: pantera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn compile -q

      - name: Run unit tests
        run: mvn test --fail-at-end
        env:
          POSTGRES_USER: pantera
          POSTGRES_PASSWORD: pantera

      - name: PMD check
        run: mvn pmd:check -q

      - name: License header check
        run: mvn com.mycila:license-maven-plugin:4.3:check -q
# TODO:Integration tests are disabled. Re-enable after migration is complete and all issues are fixed
#      - name: Build test Docker images
#        run: cd test_images && ./build.sh
#
#      - name: Run integration tests
#        run: mvn verify -Pitcase -T 1C --fail-at-end
#        env:
#          POSTGRES_USER: pantera
#          POSTGRES_PASSWORD: pantera

      - name: Package JAR with dependencies
        run: |
          mvn package dependency:copy-dependencies -DskipTests -q -pl pantera-main
          echo "JAR_FILE=$(ls pantera-main/target/pantera-main-*.jar | head -1)" >> $GITHUB_ENV

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: pantera-backend
          path: |
            pantera-main/target/pantera-main-*.jar
            pantera-main/target/dependency/
          retention-days: 5

  build-ui:
    name: Build & Test UI
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 15

    defaults:
      run:
        working-directory: pantera-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pantera-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pantera-ui
          path: pantera-ui/dist/
          retention-days: 5
