meta:
  storage:
    type: fs
    path: /var/artipie/repo
  base_url: http://artipie:8080/
  credentials:
    - type: artipie
      storage:
        type: fs
        path: /var/artipie/security
  artifacts_database:
    postgres_host: localhost
    postgres_port: 5432
    postgres_database: artifacts
    postgres_user: artipie
    postgres_password: artipie
    threads_count: 2
    interval_seconds: 3
