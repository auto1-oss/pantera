meta:
  storage:
    type: fs
    path: /var/pantera/repo
  base_url: http://pantera:8080/
  credentials:
    - type: local
      storage:
        type: fs
        path: /var/pantera/security
  artifacts_database:
    postgres_host: localhost
    postgres_port: 5432
