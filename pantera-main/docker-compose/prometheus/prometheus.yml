# Prometheus configuration for Artipie monitoring
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  # scrape_timeout is set to the global default (10s).

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    monitor: 'artipie-monitor'
    environment: 'development'

# Alertmanager configuration (optional - can be added later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
# rule_files:
#   - "alerts/*.yml"

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # Artipie Micrometer metrics endpoint (JVM, Vert.x, HTTP, Storage, Cache, Repository)
  # All metrics consolidated on single endpoint using Micrometer with Prometheus registry
  - job_name: 'artipie'
    metrics_path: '/metrics/vertx'
    static_configs:
      - targets: ['artipie:8087']
        labels:
          service: 'artipie'
          instance: 'artipie-main'

    # Scrape interval for this job (overrides global)
    scrape_interval: 10s
    scrape_timeout: 5s

    # Optional: Add basic auth if metrics endpoint is protected
    # basic_auth:
    #   username: 'prometheus'
    #   password: 'secret'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # Optional: Add other services to monitor
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['artipie-db:5432']
  #       labels:
  #         service: 'postgres'
  #         component: 'database'

  # - job_name: 'valkey'
  #   static_configs:
  #     - targets: ['valkey:6379']
  #       labels:
  #         service: 'valkey'
  #         component: 'cache'

