# Artipie Configuration with Performance Tuning
# This is an example configuration showing all available database performance settings

meta:
  storage:
    type: fs
    path: /var/artipie/repo

# Database configuration with performance optimizations
artifacts_database:
  # PostgreSQL connection settings
  postgres_host: ${POSTGRES_HOST}  # or localhost
  postgres_port: 5432
  postgres_database: artifacts
  postgres_user: artipie
  postgres_password: artipie
  
  # Connection pool settings (HikariCP)
  pool_max_size: 20        # Maximum number of connections in pool (default: 20)
  pool_min_idle: 5         # Minimum idle connections (default: 5)
  
  # Buffer settings for batch processing
  buffer_time_seconds: 2   # Time to wait before flushing batch (default: 2)
  buffer_size: 50          # Maximum events per batch (default: 50)
  
  # Legacy settings (still supported)
  threads_count: 3         # Number of parallel consumer threads (default: 1)
  interval_seconds: 5      # Interval to check events queue (default: 1)

# Performance Tuning Guidelines:
#
# For HIGH THROUGHPUT (many artifacts/sec):
#   - Increase pool_max_size to 30-50
#   - Increase buffer_size to 100-200
#   - Increase threads_count to 5-10
#   - Decrease buffer_time_seconds to 1
#
# For LOW LATENCY (quick writes):
#   - Decrease buffer_time_seconds to 1
#   - Decrease buffer_size to 20-30
#   - Keep pool_max_size at 20
#
# For RESOURCE CONSTRAINED (limited memory/CPU):
#   - Decrease pool_max_size to 10
#   - Decrease threads_count to 1-2
#   - Keep buffer settings at defaults
#
# Database Indexes:
#   All critical indexes are created automatically on startup:
#   - idx_artifacts_repo_lookup (repo_name, name, version)
#   - idx_artifacts_repo_type_name (repo_type, repo_name, name)
#   - idx_artifacts_created_date (created_date)
#   - idx_artifacts_owner (owner)
#   - idx_artifacts_release_date (release_date)
