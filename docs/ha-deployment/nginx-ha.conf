# Pantera HA Deployment - nginx reverse proxy configuration
# This configuration load-balances across multiple Artipie instances.
#
# Usage:
#   Mount this file as /etc/nginx/conf.d/default.conf in the nginx container.
#   See docker-compose-ha.yml for the full deployment setup.
#
# Requirements:
#   - All Pantera instances must share the same PostgreSQL database
#   - All Pantera instances must share the same Valkey instance
#   - Repository configs must be stored in S3 (not local filesystem)
#   - All instances must use the same pantera.yml configuration

upstream pantera_cluster {
    # Load balancing strategy: least_conn distributes to the instance
    # with the fewest active connections, which works well for artifact
    # repositories where request durations vary widely (small metadata
    # lookups vs large artifact downloads).
    least_conn;

    # List all Pantera instances.
    # max_fails: mark server as unavailable after N consecutive failures
    # fail_timeout: how long to wait before retrying a failed server
    server pantera-1:8080 max_fails=3 fail_timeout=30s;
    server pantera-2:8080 max_fails=3 fail_timeout=30s;
    server pantera-3:8080 max_fails=3 fail_timeout=30s;

    # Keepalive connections to upstream servers reduce TCP handshake overhead.
    # Set this to roughly 2x the expected concurrent requests per backend.
    keepalive 64;

    # nginx Plus only: active health checks (uncomment if using nginx Plus)
    # health_check uri=/.health interval=5s fails=3 passes=2;
}

# HTTP server - redirect to HTTPS in production, or use directly for internal traffic
server {
    listen 80;
    server_name _;

    # No upload size limit for artifacts.
    # Individual repositories may contain very large artifacts (Docker layers,
    # Maven shaded JARs, NPM tarballs). Setting this to 0 disables the limit
    # entirely and lets Pantera handle size enforcement.
    client_max_body_size 0;

    # Disable request and response buffering for streaming.
    # Pantera streams artifacts directly; buffering would consume excessive
    # memory and add latency for large files.
    proxy_request_buffering off;
    proxy_buffering off;

    # Use HTTP/1.1 for upstream connections (required for keepalive)
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Health check endpoint - used by load balancers and monitoring.
    # Returns JSON with component-level status:
    #   {"status":"UP","components":{"storage":"UP","database":"UP","valkey":"UP",...}}
    # Returns HTTP 200 if all components are healthy, 503 if any are down.
    location = /.health {
        proxy_pass http://pantera_cluster;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        # Do not retry health checks on failure - we want to know immediately
        proxy_next_upstream off;
    }

    # Metrics endpoint - Prometheus scraping
    location = /metrics/vertx {
        proxy_pass http://pantera_cluster;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # API endpoints - management REST API
    location /api/ {
        proxy_pass http://pantera_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API requests are typically small and fast
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Repository endpoints - all other paths are repository artifact requests.
    # This handles Maven, NPM, Docker, PyPI, Go, Helm, RPM, etc.
    location / {
        proxy_pass http://pantera_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large artifact support - Docker layers and Maven assemblies can
        # take minutes to upload/download over slow connections.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Retry on connection errors and timeouts, but NOT on HTTP errors.
        # This prevents duplicate uploads if one backend is slow but processing.
        proxy_next_upstream error timeout;
        proxy_next_upstream_timeout 10s;
        proxy_next_upstream_tries 2;
    }
}

