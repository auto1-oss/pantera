openapi: "3.0.0"
info:
  version: 1.0.0
  title: Artipie - OpenAPI 3.0
  description:
    This is Atripie Server based on the OpenAPI 3.0 specification.
  license:
    name: MIT
externalDocs:
  description: Find out more about Artipie
  url: https://github.com/artipie
tags:
  - name: settings
    description: Operations about settings
paths:
  /api/v1/settings/port:
    get:
      summary: Artipie server-side port (repositories default port).
      operationId: port
      tags:
        - settings
      responses:
        '200':
          description: Artipie server-side port (repositories default port)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Port'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/settings/global_prefixes:
    get:
      summary: Get global path prefixes configuration
      description: Returns the list of global path prefixes and their version
      operationId: getGlobalPrefixes
      tags:
        - settings
      responses:
        '200':
          description: Global prefixes configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalPrefixes'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update global path prefixes configuration
      description: Updates the global path prefixes list. Validates that prefixes don't conflict with existing repository names.
      operationId: updateGlobalPrefixes
      tags:
        - settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrefixesList'
      responses:
        '200':
          description: Prefixes updated successfully
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '409':
          description: Conflict - One or more prefixes match existing repository names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Port:
      type: object
      required:
        - port
      properties:
        port:
          type: integer
    GlobalPrefixes:
      type: object
      required:
        - prefixes
        - version
      properties:
        prefixes:
          type: array
          items:
            type: string
          description: List of global path prefixes
          example: ["org1", "org2", "team-alpha"]
        version:
          type: integer
          format: int64
          description: Configuration version number (increments on each update)
          example: 5
    PrefixesList:
      type: object
      required:
        - prefixes
      properties:
        prefixes:
          type: array
          items:
            type: string
          description: List of global path prefixes to set
          example: ["org1", "org2", "team-alpha"]
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string