openapi: "3.0.0"
info:
  version: 1.0.0
  title: Artipie - OpenAPI 3.0
  description:
    This is Artipie Server based on the OpenAPI 3.0 specification.
  license:
    name: MIT
externalDocs:
  description: Find out more about Artipie
  url: https://github.com/artipie
tags:
  - name: token
    description: Endpoint to generate JWT token
paths:
  /api/v1/oauth/token:
    post:
      summary: Obtain JWT auth token
      operationId: getJwtToken
      tags:
        - oauth
      requestBody:
        description: OAuth request json
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthUser'
      responses:
        '200':
          description: User JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Token"
        '401':
          description: User and password pair is not valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    UnauthorizedError:
      description: "Access token is missing or invalid"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    OAuthUser:
      type: object
      required:
        - name
        - pass
      properties:
        name:
          type: string
          description: Username for authentication
          example: "admin"
        pass:
          type: string
          format: password
          description: User password
          example: "secretpassword"
        mfa_code:
          type: string
          description: Multi-factor authentication code (for Okta MFA)
          example: "123456"
        permanent:
          type: boolean
          description: If true, generates a permanent token (no expiration)
          default: false
          example: false
    Token:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: JWT authentication token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code
        message:
          type: string
          description: Error message