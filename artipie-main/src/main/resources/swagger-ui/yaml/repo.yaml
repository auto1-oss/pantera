openapi: "3.0.0"
info:
  version: 1.0.0
  title: Artipie - OpenAPI 3.0
  description:
    This is Artipie Server based on the OpenAPI 3.0 specification.
  license:
    name: MIT
externalDocs:
  description: Find out more about Artipie
  url: https://github.com/artipie
tags:
  - name: repository
    description: Operations about repository
paths:
  /api/v1/repository/list:
    get:
      summary: List all repositories.
      description: Returns the names of all configured repositories. Requires read permission on the repository API.
      operationId: listAll
      tags:
        - repository
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: A list of the existing repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}:
    get:
      summary: Get repository settings
      description: |
        Returns the full configuration for a repository, including type, storage,
        permissions, and any proxy/group settings. Returns 404 if the repository
        does not exist, or 409 if duplicate configuration files are found.
      operationId: getRepo
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Full repository settings
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AliasRepository'
                  - $ref: '#/components/schemas/FullRepository'
        '400':
          description: Wrong repository name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '409':
          description: Repository has settings duplicates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    head:
      summary: Checks if repository settings exist
      description: Lightweight check for repository existence. Returns 200 if the repository exists, 404 otherwise.
      operationId: existRepo
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Repository exists
        '400':
          description: Wrong repository name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '409':
          description: Repository has settings duplicates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Create or update repository
      description: |
        Creates a new repository or updates an existing one. The request body must
        contain the repository configuration including type and storage. Requires
        create permission for new repositories or update permission for existing ones.
      operationId: createOrUpdateRepo
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      requestBody:
        description: Create or update repository
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Repository'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Repository was created or updated
        '400':
          description: Wrong repository name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Remove repository
      description: Permanently removes a repository and its configuration. The repository storage data is not deleted. Requires delete permission.
      operationId: removeRepo
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Remove a repository with name {rname}
        '400':
          description: Wrong repository name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/move:
    put:
      summary: Move repository
      description: Renames/moves a repository by changing its configuration key. Returns 404 if the source repository does not exist, or 409 if the target name conflicts.
      operationId: moveRepo
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      requestBody:
        description: Move a repository
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveToRepository'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Repository moved successfully
        '400':
          description: Wrong repository name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '404':
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '409':
          description: Repository has settings duplicates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/cooldown/unblock:
    post:
      summary: Unblock cooldown for repository artifact
      operationId: unblockCooldown
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      requestBody:
        description: Artifact to unblock
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CooldownUnblockRequest'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '204':
          description: Cooldown removed
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/cooldown/unblock-all:
    post:
      summary: Unblock all cooldown entries for repository
      operationId: unblockAllCooldown
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '204':
          description: All cooldown entries removed
        '400':
          description: Invalid repository configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Repository not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/artifacts:
    delete:
      summary: Delete artifact from repository
      description: |
        Delete an artifact (package) from the repository storage.
        This works for all repository types including Maven, Gradle, Composer, etc.
        For NPM packages, the path should be the package name (e.g., "@scope/package" or "package").
        For Maven artifacts, use the groupId/artifactId/version path (e.g., "com/example/mylib/1.0.0").
      operationId: deleteArtifact
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      requestBody:
        description: Artifact to delete
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactDeleteRequest'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '204':
          description: Artifact deleted successfully
        '400':
          description: Invalid request (missing path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Repository or artifact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/packages:
    delete:
      summary: Delete package folder from repository
      description: |
        Delete an entire package folder (and its contents) from the repository storage.
        This works for all repository types.
        For example, to delete an NPM package "@scope/package", the path would be "@scope/package".
        For a Maven artifact's folder like "com/example/mylib", the path would be "com/example/mylib".
      operationId: deletePackageFolder
      tags:
        - repository
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      requestBody:
        description: Package folder to delete
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactDeleteRequest'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '204':
          description: Package folder deleted successfully
        '400':
          description: Invalid request (missing path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Repository or package folder not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/storages:
    get:
      summary: Get repository storage aliases
      operationId: getRepoAliases
      tags:
        - storage aliases
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Full storage alias settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorageAlias'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/repository/{rname}/storages/{aname}:
    put:
      summary: Add or update repository storage alias
      operationId: addRepoAlias
      tags:
        - storage aliases
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
        - name: aname
          in: path
          required: true
          description: Name of the storage alias
          schema:
            type: string
      requestBody:
        description: Create a new storage alias
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Storage'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '201':
          description: Alias added successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete repository storage alias
      operationId: deleteRepoAlias
      tags:
        - storage aliases
      parameters:
        - name: rname
          in: path
          required: true
          description: Name of the repository
          schema:
            type: string
        - name: aname
          in: path
          required: true
          description: Name of the storage alias
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Alias was removed successfully
        '404':
          description: Alias does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/storages:
    get:
      summary: Get common Artipie storage aliases
      operationId: getAliases
      tags:
        - storage aliases
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Full aliases settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorageAlias'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/storages/{aname}:
    put:
      summary: Add or update common Artipie storage alias
      operationId: addAlias
      tags:
        - storage aliases
      parameters:
        - name: aname
          in: path
          required: true
          description: Name of the storage alias
          schema:
            type: string
      requestBody:
        description: Create a new storage alias
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Storage'
        required: true
      security:
        - bearerAuth: [ ]
      responses:
        '201':
          description: Alias added successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete common Artipie storage alias
      operationId: deleteAlias
      tags:
        - storage aliases
      parameters:
        - name: aname
          in: path
          required: true
          description: Name of the storage alias
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Alias was removed successfully
        '404':
          description: Alias does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code
        message:
          type: string
          description: Error message
    Repository:
      type: object
      description: Repository configuration wrapper
      required:
        - repo
      properties:
        repo:
          $ref: '#/components/schemas/RepoConfig'
    RepoConfig:
      type: object
      description: Repository configuration
      required:
        - type
        - storage
      properties:
        type:
          type: string
          description: Repository type
          enum: ["maven", "maven-proxy", "maven-group", "npm", "npm-proxy", "npm-group", "pypi", "pypi-proxy", "pypi-group", "docker", "docker-proxy", "docker-group", "rpm", "gem", "gem-group", "go", "go-proxy", "go-group", "gradle", "gradle-proxy", "gradle-group", "nuget", "php", "php-proxy", "php-group", "conan", "conda", "deb", "helm", "hexpm", "file", "file-proxy", "file-group"]
          example: "maven"
        storage:
          oneOf:
            - type: string
              description: Storage alias name
            - $ref: '#/components/schemas/StorageConfig'
          description: Storage configuration (alias name or inline config)
        permissions:
          $ref: '#/components/schemas/RepoPermissions'
        settings:
          $ref: '#/components/schemas/RepoSettings'
    FullRepository:
      type: object
      description: Full repository configuration returned by GET
      required:
        - type
        - storage
      properties:
        type:
          type: string
          description: Repository type
          example: "maven"
        storage:
          $ref: '#/components/schemas/StorageConfig'
        permissions:
          $ref: '#/components/schemas/RepoPermissions'
        settings:
          $ref: '#/components/schemas/RepoSettings'
    AliasRepository:
      type: object
      description: Repository configuration using storage alias
      required:
        - type
        - storage
      properties:
        type:
          type: string
          description: Repository type
          example: "npm-proxy"
        storage:
          type: string
          description: Storage alias name
          example: "default"
    StorageConfig:
      type: object
      description: Storage configuration
      required:
        - type
      properties:
        type:
          type: string
          description: Storage type
          enum: ["fs", "s3", "etcd", "redis"]
          example: "fs"
        path:
          type: string
          description: File system path (for fs storage)
          example: "/var/artipie/data"
        bucket:
          type: string
          description: S3 bucket name (for s3 storage)
          example: "my-artifacts"
        region:
          type: string
          description: S3 region (for s3 storage)
          example: "us-east-1"
        endpoint:
          type: string
          description: Custom S3 endpoint URL
          example: "https://s3.example.com"
        credentials:
          type: object
          description: S3 credentials
          properties:
            type:
              type: string
              enum: ["basic", "env"]
            accessKeyId:
              type: string
            secretAccessKey:
              type: string
    RepoPermissions:
      type: object
      description: Repository-level permissions
      additionalProperties:
        type: array
        items:
          type: string
          enum: ["read", "write", "delete", "*"]
      example:
        alice:
          - read
          - write
        bob:
          - read
        /readers:
          - read
    RepoSettings:
      type: object
      description: Repository-specific settings
      properties:
        remote:
          $ref: '#/components/schemas/RemoteConfig'
        members:
          type: array
          description: Group repository members
          items:
            type: string
          example: ["local-maven", "maven-central-proxy"]
        cooldown:
          $ref: '#/components/schemas/CooldownConfig'
    RemoteConfig:
      type: object
      description: Remote/proxy repository configuration
      properties:
        url:
          type: string
          format: uri
          description: Remote repository URL
          example: "https://repo.maven.apache.org/maven2"
        username:
          type: string
          description: Authentication username
        password:
          type: string
          format: password
          description: Authentication password
        cache:
          type: object
          description: Cache configuration
          properties:
            storage:
              oneOf:
                - type: string
                - $ref: '#/components/schemas/StorageConfig'
    CooldownConfig:
      type: object
      description: Cooldown configuration for proxy repositories
      properties:
        enabled:
          type: boolean
          description: Whether cooldown is enabled
          default: false
        duration:
          type: string
          description: Cooldown duration (ISO-8601 format)
          example: "P7D"
        type:
          type: string
          description: Cooldown type
          enum: ["valkey", "file"]
          example: "valkey"
    StorageAlias:
      type: object
      description: Storage alias entry
      required:
        - alias
        - storage
      properties:
        alias:
          type: string
          description: Alias name
          example: "default"
        storage:
          $ref: '#/components/schemas/StorageConfig'
    Storage:
      type: object
      description: Storage configuration for creating aliases
      required:
        - type
      properties:
        type:
          type: string
          description: Storage type
          enum: ["fs", "s3", "etcd", "redis"]
          example: "fs"
        path:
          type: string
          description: File system path
          example: "/var/artipie/data"
        bucket:
          type: string
          description: S3 bucket name
        region:
          type: string
          description: S3 region
        endpoint:
          type: string
          description: Custom S3 endpoint
    MoveToRepository:
      type: object
      description: Request to move/rename a repository
      required:
        - new_name
      properties:
        new_name:
          type: string
          description: New repository name
          example: "my-new-repo-name"
    CooldownUnblockRequest:
      type: object
      description: Request to unblock a specific artifact from cooldown
      required:
        - artifact
        - version
      properties:
        artifact:
          type: string
          description: Artifact/package name
          example: "@scope/my-package"
        version:
          type: string
          description: Artifact version
          example: "1.2.3"
    ArtifactDeleteRequest:
      type: object
      description: Request to delete an artifact from repository
      required:
        - path
      properties:
        path:
          type: string
          description: |
            Path to the artifact within the repository storage.
            Examples:
            - Maven: "com/example/mylib/1.0.0" (deletes entire version directory)
            - NPM: "@scope/package" or "package" (deletes package directory)
            - Composer: "vendor/package" (deletes package directory)
          example: "com/example/mylib/1.0.0"
  responses:
    UnauthorizedError:
      description: "Access token is missing or invalid"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
security:
  - bearerAuth: []
