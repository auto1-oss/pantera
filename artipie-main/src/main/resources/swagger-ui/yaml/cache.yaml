openapi: "3.0.0"
info:
  version: 1.0.0
  title: Artipie - OpenAPI 3.0
  description:
    This is Artipie Server based on the OpenAPI 3.0 specification.
  license:
    name: MIT
externalDocs:
  description: Find out more about Artipie
  url: https://github.com/artipie
tags:
  - name: cache
    description: Cache management operations
  - name: health
    description: Health check endpoints
paths:
  /api/health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the Artipie server
      operationId: healthCheck
      tags:
        - health
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: "ok"
  /api/cache/negative/groups:
    get:
      summary: List all registered groups
      description: Returns a list of all group repository names that have negative cache instances registered
      operationId: listCacheGroups
      tags:
        - cache
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: List of registered group names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupsList'
              example:
                groups: ["npm_group", "maven_group", "pypi_group"]
                count: 3
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/cache/negative/group/{groupName}/stats:
    get:
      summary: Get cache statistics for a group
      description: Returns L1 cache size and whether two-tier caching (L2 Valkey/Redis) is enabled
      operationId: getCacheStats
      tags:
        - cache
      parameters:
        - name: groupName
          in: path
          required: true
          description: Name of the group repository
          schema:
            type: string
          example: "npm_group"
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Cache statistics for the group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheStats'
              example:
                group: "npm_group"
                l1Size: 1250
                twoTier: true
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Group not found in cache registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupNotFoundError'
              example:
                error: "Group not found in cache registry"
                group: "unknown_group"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/cache/negative/group/{groupName}:
    delete:
      summary: Clear all negative cache for a group
      description: |
        Removes all negative cache entries (cached 404 responses) for the specified group repository.
        This clears both L1 (in-memory) and L2 (Valkey/Redis) caches if configured.
        Use this when you know packages have been published and want to force re-fetching.
      operationId: clearGroupCache
      tags:
        - cache
      parameters:
        - name: groupName
          in: path
          required: true
          description: Name of the group repository to clear cache for
          schema:
            type: string
          example: "npm_group"
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Cache cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheClearResponse'
              example:
                status: "cleared"
                group: "npm_group"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Failed to clear cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheOperationError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/cache/negative/group/{groupName}/package:
    delete:
      summary: Invalidate specific package cache in a group
      description: |
        Removes negative cache entries for a specific package path within a group repository.
        Use this after publishing a new package to ensure it's immediately available.
        The path should match the package identifier (e.g., "@scope/package-name" for NPM).
      operationId: invalidatePackageInGroup
      tags:
        - cache
      parameters:
        - name: groupName
          in: path
          required: true
          description: Name of the group repository
          schema:
            type: string
          example: "npm_group"
      requestBody:
        required: true
        description: Package path to invalidate
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackagePathRequest'
            example:
              path: "@scope/package-name"
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Package cache invalidated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PackageInvalidateResponse'
              example:
                status: "invalidated"
                group: "npm_group"
                package: "@scope/package-name"
        '400':
          description: Invalid request (missing path or invalid JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestError'
              example:
                error: "Missing 'path' in request body"
                example: "{\"path\": \"@scope/package-name\"}"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Failed to invalidate cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheOperationError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/cache/negative/package:
    delete:
      summary: Invalidate package cache globally
      description: |
        Removes negative cache entries for a specific package path across ALL group repositories.
        This is useful when a package is published to a member repository that is used by multiple groups.
        The operation affects all registered group caches.
      operationId: invalidatePackageGlobally
      tags:
        - cache
      requestBody:
        required: true
        description: Package path to invalidate globally
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackagePathRequest'
            example:
              path: "@scope/package-name"
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Package cache invalidated in all groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalInvalidateResponse'
              example:
                status: "invalidated"
                package: "@scope/package-name"
                groupsAffected: ["npm_group", "npm_mirror", "all_packages"]
        '400':
          description: Invalid request (missing path or invalid JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidRequestError'
              example:
                error: "Missing 'path' in request body"
                example: "{\"path\": \"@scope/package-name\"}"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          description: Failed to invalidate cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CacheOperationError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Health status indicator
          enum: ["ok", "degraded", "unhealthy"]
    GroupsList:
      type: object
      required:
        - groups
        - count
      properties:
        groups:
          type: array
          items:
            type: string
          description: List of registered group repository names
        count:
          type: integer
          description: Number of registered groups
    CacheStats:
      type: object
      required:
        - group
        - l1Size
        - twoTier
      properties:
        group:
          type: string
          description: Group repository name
        l1Size:
          type: integer
          format: int64
          description: Number of entries in L1 (in-memory) cache
        twoTier:
          type: boolean
          description: Whether L2 (Valkey/Redis) caching is enabled
    GroupNotFoundError:
      type: object
      required:
        - error
        - group
      properties:
        error:
          type: string
          description: Error message
        group:
          type: string
          description: Group name that was not found
    CacheClearResponse:
      type: object
      required:
        - status
        - group
      properties:
        status:
          type: string
          description: Operation status
          enum: ["cleared"]
        group:
          type: string
          description: Group repository name
    PackagePathRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: |
            Package path to invalidate. Format depends on repository type:
            - NPM: "@scope/package-name" or "package-name"
            - Maven: "com/example/artifact"
            - PyPI: "package-name"
    PackageInvalidateResponse:
      type: object
      required:
        - status
        - group
        - package
      properties:
        status:
          type: string
          description: Operation status
          enum: ["invalidated"]
        group:
          type: string
          description: Group repository name
        package:
          type: string
          description: Package path that was invalidated
    GlobalInvalidateResponse:
      type: object
      required:
        - status
        - package
        - groupsAffected
      properties:
        status:
          type: string
          description: Operation status
          enum: ["invalidated"]
        package:
          type: string
          description: Package path that was invalidated
        groupsAffected:
          type: array
          items:
            type: string
          description: List of group names where cache was invalidated
    InvalidRequestError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
        example:
          type: string
          description: Example of correct request format
    CacheOperationError:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Detailed error message
  responses:
    UnauthorizedError:
      description: "Access token is missing or invalid"
security:
  - bearerAuth: []
