openapi: "3.0.0"
info:
  version: 1.0.0
  title: Artipie - OpenAPI 3.0
  description:
    This is Atripie Server based on the OpenAPI 3.0 specification.
  license:
    name: MIT
externalDocs:
  description: Find out more about Artipie
  url: https://github.com/artipie
tags:
  - name: roles
    description: Operations about user roles
paths:
  /api/v1/roles:
    get:
      summary: List all roles.
      operationId: listAllRoles
      tags:
        - roles
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: A list of the existing roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/roles/{role}:
    get:
      summary: Get role info.
      operationId: getRole
      tags:
        - roles
      parameters:
        - name: role
          in: path
          required: true
          description: Role name
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Role info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        '404':
          description: Role does not exist
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Create or replace role.
      operationId: putRole
      tags:
        - roles
      parameters:
        - name: role
          in: path
          required: true
          description: Role name
          schema:
            type: string
      requestBody:
        description: Role info json
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullRole'
      security:
        - bearerAuth: [ ]
      responses:
        '201':
          description: Role successfully added
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete role info.
      operationId: deleteRole
      tags:
        - roles
      parameters:
        - name: role
          in: path
          required: true
          description: Role name
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Role removed successfully
        '404':
          description: Role does not exist
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/roles/{role}/disable:
    post:
      summary: Disable role.
      operationId: disable
      tags:
        - roles
      parameters:
        - name: role
          in: path
          required: true
          description: Role name
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Role disabled successfully
        '404':
          description: Role does not exist
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/roles/{role}/enable:
    post:
      summary: Enable role.
      operationId: enable
      tags:
        - roles
      parameters:
        - name: role
          in: path
          required: true
          description: Role name
          schema:
            type: string
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Role enabled successfully
        '404':
          description: Role does not exist
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code
        message:
          type: string
          description: Error message
    Role:
      type: object
      description: Role information returned by GET endpoints
      required:
        - name
      properties:
        name:
          type: string
          description: Role name (unique identifier)
          example: "developers"
        enabled:
          type: boolean
          description: Whether the role is enabled
          example: true
        permissions:
          $ref: '#/components/schemas/Permissions'
    FullRole:
      type: object
      description: Full role configuration for creating or updating roles
      required:
        - permissions
      properties:
        permissions:
          $ref: '#/components/schemas/Permissions'
        enabled:
          type: boolean
          description: Whether the role should be enabled
          default: true
          example: true
    Permissions:
      type: object
      description: |
        Permissions configuration object. Supports various permission types:
        - api_repository_permissions: REST API repository operations
        - api_user_permissions: REST API user management
        - api_role_permissions: REST API role management
        - api_alias_permissions: REST API storage alias management
        - api_cache_permissions: REST API cache management
        - adapter_basic_permissions: Repository-level artifact operations
      properties:
        api_repository_permissions:
          oneOf:
            - type: string
              description: Wildcard for all permissions
              enum: ["*"]
            - type: array
              items:
                type: string
                enum: ["read", "create", "update", "delete", "move"]
          description: Permissions for repository REST API operations
          example: ["read", "create"]
        api_user_permissions:
          oneOf:
            - type: string
              enum: ["*"]
            - type: array
              items:
                type: string
                enum: ["read", "create", "update", "delete", "enable", "change_password"]
          description: Permissions for user REST API operations
          example: "*"
        api_role_permissions:
          oneOf:
            - type: string
              enum: ["*"]
            - type: array
              items:
                type: string
                enum: ["read", "create", "update", "delete", "enable"]
          description: Permissions for role REST API operations
          example: ["read"]
        api_alias_permissions:
          oneOf:
            - type: string
              enum: ["*"]
            - type: array
              items:
                type: string
                enum: ["read", "create", "delete"]
          description: Permissions for storage alias REST API operations
          example: ["read", "create"]
        api_cache_permissions:
          oneOf:
            - type: string
              enum: ["*"]
            - type: array
              items:
                type: string
                enum: ["read", "write"]
          description: Permissions for cache REST API operations
          example: ["read", "write"]
        adapter_basic_permissions:
          type: object
          description: Repository-specific artifact permissions
          additionalProperties:
            type: array
            items:
              type: string
              enum: ["read", "write", "delete", "*"]
          example:
            my-maven:
              - read
              - write
            my-npm:
              - "*"
      additionalProperties: true
  responses:
    UnauthorizedError:
      description: "Access token is missing or invalid"
security:
  - bearerAuth: []