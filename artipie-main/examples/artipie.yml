meta:
  storage:
    type: fs
    path: /var/artipie/cfg
  credentials:
    - type: env
  cooldown:
    enabled: true
    newer_than_cache_hours: 72
    fresh_release_hours: 72
  artifacts_database:
    postgres_host: localhost
    postgres_port: 5432
    postgres_database: artifacts
    postgres_user: artipie
    postgres_password: artipie
