meta:
  storage:
    type: fs
    path: /var/artipie/repo
  credentials:
    - type: env
    - type: artipie
  policy:
    type: artipie
    eviction_millis: 180000 # optional, default 3 min
    storage: # required
      type: fs
      path: /var/artipie/security
  cooldown:
    enabled: true
    # Enable or disable each cooldown rule independently
    enable_newer_than_cache: true
    enable_fresh_release: true
    # Use unified duration strings: m = minutes, h = hours, d = days
    newer_than_cache_by: 72h
    fresh_release_age: 72h
  artifacts_database:
    postgres_host: artipie-db
    postgres_port: 5432
    postgres_database: artifacts
    postgres_user: artipie
    postgres_password: artipie
  logging:
    level: INFO
    loggers:
      com.artipie: INFO
      com.artipie.maven.http.CachedProxySlice: INFO
  metrics:
    endpoint: "/metrics/vertx" # Path of the endpoint, starting with `/`, where the metrics will be served
    port: 8087 # Port to serve the metrics
    types:
      - jvm # enables jvm-related metrics 
      - storage # enables storage-related metrics
      - http # enables http requests/responses related metrics
