meta:
  storage:
    type: fs
    path: /var/artipie/repo
  
  # JWT token settings
  jwt:
    # Set to true for tokens that expire, false for permanent tokens
    expires: true
    # Token lifetime in seconds (default: 86400 = 24 hours)
    expiry-seconds: 86400
    # Secret key for signing tokens (use env var in production)
    secret: ${JWT_SECRET}
  
  credentials:
    # - type: env
    - type: artipie
    - type: keycloak
      url: "http://keycloak:8080"
      realm: artipie
      client-id: artipie
      client-password: ${KEYCLOAK_CLIENT_SECRET}
      user-domains:
        - "local"

    - type: jwt-password

    - type: okta
      issuer: ${OKTA_ISSUER}
      client-id: ${OKTA_CLIENT_ID}
      client-secret: ${OKTA_CLIENT_SECRET}
      redirect-uri: ${OKTA_REDIRECT_URI}
      scope: "openid email profile groups"
      groups-claim: "groups"
      group-roles:
        "artipie_readers": "reader"
      user-domains:
        - "@test.local"
  
  policy:
    type: artipie
    eviction_millis: 180000 # optional, default 3 min
    storage:
      type: fs
      path: /var/artipie/security
  
  cooldown:
    # Global default: disabled. Only enable for specific repo types below.
    enabled: false
    # Use duration strings: m = minutes, h = hours, d = days
    minimum_allowed_age: 7d
    repo_types:
      npm-proxy:
        enabled: true
#      docker-proxy:
#        enabled: true

  # Global group repository settings (can be overridden per-repo in settings.group)
  group:
    # Package location index TTLs
    index:
      remote_exists_ttl: 1d      # Cache that remote repo has package
      remote_not_exists_ttl: 7d   # Negative cache for 404s
      local_event_driven: true    # Immediate updates for local repos
    # Merged metadata cache
    metadata:
      ttl: 12h                    # Merged metadata cache TTL
      stale_serve: 1h             # Serve stale if upstream down
      background_refresh_at: 0.9  # Trigger refresh at 80% of TTL
    # Resolution behavior
    resolution:
      upstream_timeout: 5s        # Max wait per upstream request
      max_parallel: 16            # Max concurrent upstream requests
    # Cache sizing (L1=in-memory, L2=Valkey)
    cache_sizing:
      l1_max_entries: 10000
      l2_max_entries: 1000000

  artifacts_database:
    postgres_host: "artipie-db"
    postgres_port: 5432
    postgres_database: artifacts
    postgres_user: ${POSTGRES_USER}
    postgres_password: ${POSTGRES_PASSWORD}
    pool_max_size: 50
    pool_min_idle: 10
  

  http_client:
    # Connection settings
    connection_timeout: 15000           # ms, default 15s
    idle_timeout: 30000                 # ms, default 30s
    read_idle_timeout: 60000            # ms, for slow downloads, default 60s
    # Pool settings
    max_connections_per_destination: 16
    max_total_connections: 1024
    max_requests_queued_per_destination: 32
    # Protocol
    http2_enabled: true                 # HTTP/2 with HTTP/1.1 fallback
    trust_all: false
    follow_redirects: true
    # Retry (exponential backoff + jitter)
    retry:
      max_attempts: 3
      initial_delay: 100                # ms
      max_delay: 1000                   # ms cap
      multiplier: 2.0
      jitter: 0.2                       # ±20%
      retryable_status_codes: [ 502, 503, 504 ]
    # Circuit breaker (per destination)
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      success_threshold: 3
      timeout: 30000                    # ms before half-open
      failure_rate_threshold: 80        # percentage to open
      sliding_window_size: 10
    # Cache strategy
    cache:
      artifact_ttl: -1                  # forever (immutable)

    # Proxy timeout
    proxy_timeout: 120                  # seconds

  http_server:
    # ISO-8601 duration (or milliseconds) before failing long running requests. Use 0 to disable.
    request_timeout: PT2M

  metrics:
    endpoint: /metrics/vertx # Path of the endpoint, starting with `/`, where the metrics will be served
    port: 8087 # Port to serve the metrics
    types:
      - jvm # enables jvm-related metrics
      - storage # enables storage-related metrics
      - http # enables http requests/responses related metrics
  global_prefixes:
    - test_prefix

  caches:
    valkey:
      enabled: true
      host: valkey
      port: 6379
      timeout: 100ms

    cooldown:
      ttl: 24h
      maxSize: 1000
      valkey:
        enabled: true
        l1MaxSize: 1000
        l1Ttl: 24h
        l2MaxSize: 5000000
        l2Ttl: 7d

    negative:
      ttl: 24h
      maxSize: 5000
      valkey:
        enabled: true
        l1MaxSize: 5000
        l1Ttl: 24h
        l2MaxSize: 5000000
        l2Ttl: 7d
    auth:
      ttl: 5m
      maxSize: 1000
      valkey:
        enabled: true
        l1MaxSize: 1000
        l1Ttl: 5m
        l2MaxSize: 100000
        l2Ttl: 5m
    maven-metadata:
      ttl: 24h
      maxSize: 1000
      valkey:
        enabled: true
        l1MaxSize: 0
        l1Ttl: 24h
        l2MaxSize: 1000000
        l2Ttl: 72h

    npm-search:
      ttl: 24h
      maxSize: 1000
      valkey:
        enabled: true
        l1MaxSize: 1000
        l1Ttl: 24h
        l2MaxSize: 1000000
        l2Ttl: 72h

    cooldown-metadata:
      ttl: 30d
      maxSize: 1000
      valkey:
        enabled: true
        l1MaxSize: 0
        l1Ttl: 30d
        l2MaxSize: 500000
        l2Ttl: 30d