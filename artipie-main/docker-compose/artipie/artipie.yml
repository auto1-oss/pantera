meta:
  storage:
    type: fs
    path: /var/artipie/repo
  credentials:
    - type: env
    - type: artipie
    - type: keycloak
      url: "http://keycloak:8080"
      realm: artipie
      "client-id": artipie
      "client-password": T4BphdGe7z8X5ycSe4aVjhDGdExx2yuJ
  policy:
    type: artipie
    eviction_millis: 180000 # optional, default 3 min
    storage:
      type: fs
      path: /var/artipie/security
  cooldown:
    enabled: true
    repo_types:
      maven-proxy:
        enabled: false
    # Use duration strings: m = minutes, h = hours, d = days
    minimum_allowed_age: 7d
  artifacts_database:
    postgres_host: "artipie-db"
    postgres_port: 5432
    postgres_database: artifacts
    postgres_user: artipie
    postgres_password: artipie
  
  http_client:
    proxy_timeout: 60
    max_connections_per_destination: 512
    max_requests_queued_per_destination: 2048
    idle_timeout: 30000
    connect_timeout: 10000
    follow_redirects: true
    connection_acquire_timeout: 120000  # ms to wait for pooled connection before failing

  http_server:
    # ISO-8601 duration (or milliseconds) before failing long running requests. Use 0 to disable.
    request_timeout: PT2M

  metrics:
    endpoint: /metrics/vertx # Path of the endpoint, starting with `/`, where the metrics will be served
    port: 8087 # Port to serve the metrics
    types:
      - jvm # enables jvm-related metrics
      - storage # enables storage-related metrics
      - http # enables http requests/responses related metrics
  global_prefixes:
    - test_prefix

  caches:
    valkey:
      enabled: true
      host: valkey
      port: 6379
      timeout: 100ms
    cooldown:
      ttl: 24h
      maxSize: 100000
      valkey:
        enabled: true
        l1MaxSize: 100000
        l1Ttl: 24h
        l2MaxSize: 5000000
        l2Ttl: 7d
    negative:
      ttl: 24h
      maxSize: 50000
      valkey:
        enabled: true
        l1MaxSize: 50000
        l1Ttl: 24h
        l2MaxSize: 5000000
        l2Ttl: 7d
    auth:
      ttl: 5m
      maxSize: 10000
      valkey:
        enabled: true
        l1MaxSize: 1000
        l1Ttl: 5m
        l2MaxSize: 100000
        l2Ttl: 5m
    maven-metadata:
      ttl: 24h
      maxSize: 10000
      valkey:
        enabled: true
        l1MaxSize: 10000
        l1Ttl: 24h
        l2MaxSize: 1000000
        l2Ttl: 72h
    maven-negative:
      ttl: 24h
      maxSize: 50000
      valkey:
        enabled: true
        l1MaxSize: 50000
        l1Ttl: 24h
        l2MaxSize: 5000000
        l2Ttl: 72h
    npm-search:
      ttl: 24h
      maxSize: 50000
      valkey:
        enabled: true
        l1MaxSize: 50000
        l1Ttl: 24h
        l2MaxSize: 1000000
        l2Ttl: 72h