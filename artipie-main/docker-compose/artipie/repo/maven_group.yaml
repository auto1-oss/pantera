repo:
  type: "maven-group"
  # Members are listed in priority order - first match wins
  members:
    - maven          # local repository (highest priority)
    - remotes        # proxy to Maven Central
  # Optional: override global group cache settings
  settings:
    group:
      index:
        remote_exists_ttl: 30m
        remote_not_exists_ttl: 10m
      metadata:
        ttl: 10m
