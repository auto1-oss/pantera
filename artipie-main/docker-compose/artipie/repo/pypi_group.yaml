repo:
  type: "pypi-group"
  # Members are listed in priority order - first match wins
  members:
    - pypi           # local repository (highest priority)
    - pypi_proxy     # proxy to pypi.org
  # Optional: override global group cache settings
  settings:
    group:
      index:
        remote_exists_ttl: 15m
      metadata:
        ttl: 5m
