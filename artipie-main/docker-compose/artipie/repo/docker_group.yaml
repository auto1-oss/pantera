repo:
  type: "docker-group"
  # Members are listed in priority order - first match wins
  members:
    - docker_local   # local registry (highest priority)
    - docker_proxy   # proxy to Docker Hub
  # Optional: override global group cache settings
  settings:
    group:
      index:
        remote_exists_ttl: 15m
      metadata:
        ttl: 5m
