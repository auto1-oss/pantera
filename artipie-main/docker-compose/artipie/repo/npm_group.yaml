repo:
  type: "npm-group"
  # Members are listed in priority order - first match wins
  members:
    - npm           # local repository (highest priority)
    - npm_proxy     # proxy to npmjs.org
  # Optional: override global group cache settings
  settings:
    group:
      index:
        remote_exists_ttl: 15m
      metadata:
        ttl: 5m
