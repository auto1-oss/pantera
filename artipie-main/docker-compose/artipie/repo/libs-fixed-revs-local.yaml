repo:
  type: maven
  storage:
    type: s3
    bucket: artipie-prod
    region: eu-west-1
    endpoint: https://s3.eu-west-1.amazonaws.com
    credentials:
      type: profile
      profile: shared-services-prod-devops
    multipart: true
    multipart-min-size: 32MB
    part-size: 16MB
    multipart-concurrency: 4
    checksum: SHA256
    sse:
      type: AES256
    parallel-download: false
    cache:
      enabled: true
      path: /var/artipie/cache
      max-bytes: 1099511627776
      eviction-policy: LFU
      cleanup-interval-millis: 0
      high-watermark-percent: 90
      low-watermark-percent: 85
      validate-on-read: false
