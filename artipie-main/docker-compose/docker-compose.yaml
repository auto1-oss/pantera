services:
  artipie:
    depends_on:
      artipie-db:
        condition: service_healthy
      keycloak:
        condition: service_started
      valkey:
        condition: service_healthy
    image: auto1-artipie:1.20.0
    cpus: 2
    mem_reservation: 4gb
    container_name: artipie
    restart: unless-stopped
    environment:
      - ARTIPIE_USER_NAME=artipie
      - ARTIPIE_USER_PASS=artipie
      - ARTIPIE_CONFIG=/etc/artipie/artipie.yml
      - HOME=/home/
      - AWS_CONFIG_FILE=/home/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/home/.aws/credentials
      - AWS_SDK_LOAD_CONFIG=1
      - AWS_PROFILE=profile_name
      - AWS_REGION=eu-west-1
      # Version (change this when bumping version)
      - ARTIPIE_VERSION=1.20.0
      # Log4j2 configuration file location
      - LOG4J_CONFIGURATION_FILE=/etc/artipie/log4j2.xml
      - ELASTIC_APM_ENABLED=true
      - ELASTIC_APM_ENVIRONMENT=development
      - ELASTIC_APM_SERVER_URL=http://apm:8200
      - ELASTIC_APM_SERVICE_NAME=artipie
      - ELASTIC_APM_SERVICE_VERSION=1.19.1
      - ELASTIC_APM_LOG_LEVEL=INFO
      - ELASTIC_APM_LOG_FORMAT_SOUT=JSON
      - ELASTIC_APM_TRANSACTION_MAX_SPANS=1000
      - ELASTIC_APM_ENABLE_EXPERIMENTAL_INSTRUMENTATIONS=true
      - ELASTIC_APM_CAPTURE_BODY=errors
      - ELASTIC_APM_USE_PATH_AS_TRANSACTION_NAME=false
      - ELASTIC_APM_SPAN_COMPRESSION_ENABLED=true
      - ELASTIC_APM_CAPTURE_JMX_METRICS=object_name[*:type=*,name=*] attribute[*]
    volumes:
      - ./artipie/artipie.yml:/etc/artipie/artipie.yml
      - ./log4j2.xml:/etc/artipie/log4j2.xml
      - ./artipie/repo:/var/artipie/repo
      - ./artipie/security:/var/artipie/security
      - ./artipie/data:/var/artipie/data
      - ./artipie/cache:/var/artipie/cache
      - ~/.aws:/home/.aws
    networks:
      - artipie-net
      - es
    ports:
      - "8086:8086"
      - "8087:8087"
      - "8088:8080"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - artipie
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - artipie-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    depends_on:
      artipie-db:
        condition: service_healthy
    command:
    - start-dev
    - --import-realm
    restart: unless-stopped
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://artipie-db:5432/keycloak
      - KC_DB_USERNAME=artipie
      - KC_DB_PASSWORD=artipie
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
    - ./keycloak-export:/opt/keycloak/data/import
    networks:
      - artipie-net

  artipie-db:
    image: postgres:15-alpine
    container_name: artipie-db
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=artipie
      - POSTGRES_PASSWORD=artipie
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "artifacts" ]
      interval: 10s
      timeout: 60s
      retries: 6

  valkey:
    image: valkey/valkey:8.1.4
    container_name: valkey
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "6379:6379"
    command:
      - valkey-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkey-data:/data

networks:
  artipie-net:
    driver: bridge
  es:
    external: true
    name: 92_es

volumes:
  valkey-data: