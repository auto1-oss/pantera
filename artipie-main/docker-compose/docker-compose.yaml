services:
  artipie:
    depends_on:
      artipie-db:
        condition: service_healthy
      keycloak:
        condition: service_started
      valkey:
        condition: service_healthy
    image: auto1-artipie:1.20.6
    # PERFORMANCE: Increased from 2 CPUs to 4 for better parallel request handling
    # NPM install with 2300+ packages requires significant parallelism
    cpus: 4
    mem_limit: 6gb
    mem_reservation: 6gb
    container_name: artipie
    restart: unless-stopped
    environment:
      - ARTIPIE_USER_NAME=artipie
      - ARTIPIE_USER_PASS=artipie
      - ARTIPIE_CONFIG=/etc/artipie/artipie.yml
      - HOME=/home/
      - AWS_CONFIG_FILE=/home/.aws/config
      - AWS_SHARED_CREDENTIALS_FILE=/home/.aws/credentials
      - AWS_SDK_LOAD_CONFIG=1
      - AWS_PROFILE=profile_name
      - AWS_REGION=eu-west-1
      # Version (change this when bumping version)
      - ARTIPIE_VERSION=1.20.6
      # Log4j2 configuration file location
      - LOG4J_CONFIGURATION_FILE=/etc/artipie/log4j2.xml
      - ELASTIC_APM_ENABLED=false
      - ELASTIC_APM_ENVIRONMENT=development
      - ELASTIC_APM_SERVER_URL=http://apm:8200
      - ELASTIC_APM_SERVICE_NAME=artipie
      - ELASTIC_APM_SERVICE_VERSION=1.19.1
      - ELASTIC_APM_LOG_LEVEL=INFO
      - ELASTIC_APM_LOG_FORMAT_SOUT=JSON
      - ELASTIC_APM_TRANSACTION_MAX_SPANS=1000
      - ELASTIC_APM_ENABLE_EXPERIMENTAL_INSTRUMENTATIONS=true
      - ELASTIC_APM_CAPTURE_BODY=errors
      - ELASTIC_APM_USE_PATH_AS_TRANSACTION_NAME=false
      - ELASTIC_APM_SPAN_COMPRESSION_ENABLED=true
      - ELASTIC_APM_CAPTURE_JMX_METRICS=object_name[*:type=*,name=*] attribute[*]
      # PERFORMANCE: Increased heap to 4GB, more GC threads for 4 CPUs, increased filesystem IO threads
      - JVM_ARGS=-Xms3g -Xmx4g -XX:+UseG1GC -XX:G1ReservePercent=10 -XX:MaxGCPauseMillis=200 -XX:MaxDirectMemorySize=1g -XX:ParallelGCThreads=4 -XX:ConcGCThreads=2 -XX:+UseStringDeduplication -XX:+ParallelRefProcEnabled -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/var/artipie/logs/heapdump.hprof -Xlog:gc*:file=/var/artipie/logs/gc.log:time,uptime:filecount=5,filesize=50M -Djava.io.tmpdir=/var/artipie/cache/tmp -Dvertx.cacheDirBase=/var/artipie/cache/tmp -Dio.netty.leakDetection.level=simple -XX:InitiatingHeapOccupancyPercent=45 -XX:+AlwaysPreTouch -Dvertx.max.worker.execute.time=120000000000 -Dartipie.filesystem.io.threads=8
    volumes:
      - ./artipie/artipie.yml:/etc/artipie/artipie.yml
      - ./log4j2.xml:/etc/artipie/log4j2.xml
      - ./artipie/prod_repo:/var/artipie/repo
      - ./artipie/security:/var/artipie/security
      - ./artipie/data:/var/artipie/data
      - ./artipie/cache:/var/artipie/cache
      - ~/.aws:/home/.aws
    networks:
      - artipie-net
    #  - es
    ports:
      - "8086:8086"
      - "8087:8087"
      - "8088:8080"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - artipie
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - artipie-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    depends_on:
      artipie-db:
        condition: service_healthy
    command:
    - start-dev
    - --import-realm
    restart: unless-stopped
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://artipie-db:5432/keycloak
      - KC_DB_USERNAME=artipie
      - KC_DB_PASSWORD=artipie
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
    - ./keycloak-export:/opt/keycloak/data/import
    networks:
      - artipie-net

  artipie-db:
    image: postgres:15-alpine
    container_name: artipie-db
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=artipie
      - POSTGRES_PASSWORD=artipie
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "artifacts" ]
      interval: 10s
      timeout: 60s
      retries: 6

  valkey:
    image: valkey/valkey:8.1.4
    container_name: valkey
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "6379:6379"
    command:
      - valkey-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkey-data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - artipie

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  artipie-net:
    driver: bridge
#  es:
#    external: true
#    name: 92_es

volumes:
  valkey-data:
  prometheus-data:
  grafana-data: