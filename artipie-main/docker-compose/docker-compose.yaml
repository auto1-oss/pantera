services:
  artipie:
    depends_on:
      artipie-db:
        condition: service_healthy
      keycloak:
        condition: service_started
      valkey:
        condition: service_healthy
    image: auto1-artipie:${ARTIPIE_VERSION}
    # PERFORMANCE: Increased from 2 CPUs to 4 for better parallel request handling
    # NPM install with 2300+ packages requires significant parallelism
    cpus: 4
    mem_limit: 6gb
    mem_reservation: 6gb
    # FILE DESCRIPTOR OPTIMIZATION: High limits for many concurrent connections
    # Required for: proxy connections, cached file handles, streaming uploads/downloads
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc:
        soft: 65536
        hard: 65536
    container_name: artipie
    restart: unless-stopped
    environment:
      - ARTIPIE_USER_NAME=${ARTIPIE_USER_NAME}
      - ARTIPIE_USER_PASS=${ARTIPIE_USER_PASS}
      - ARTIPIE_CONFIG=${ARTIPIE_CONFIG}
      - HOME=/home/
      - AWS_CONFIG_FILE=${AWS_CONFIG_FILE}
      - AWS_SHARED_CREDENTIALS_FILE=${AWS_SHARED_CREDENTIALS_FILE}
      - AWS_SDK_LOAD_CONFIG=${AWS_SDK_LOAD_CONFIG}
      - AWS_PROFILE=${AWS_PROFILE}
      - AWS_REGION=${AWS_REGION}
      # Version (change this when bumping version)
      - ARTIPIE_VERSION=${ARTIPIE_VERSION}
      # Log4j2 configuration file location
      - LOG4J_CONFIGURATION_FILE=/etc/artipie/log4j2.xml
      - ELASTIC_APM_ENABLED=${ELASTIC_APM_ENABLED}
      - ELASTIC_APM_ENVIRONMENT=${ELASTIC_APM_ENVIRONMENT}
      - ELASTIC_APM_SERVER_URL=${ELASTIC_APM_SERVER_URL}
      - ELASTIC_APM_SERVICE_NAME=${ELASTIC_APM_SERVICE_NAME}
      - ELASTIC_APM_SERVICE_VERSION=${ELASTIC_APM_SERVICE_VERSION}
      - ELASTIC_APM_LOG_LEVEL=${ELASTIC_APM_LOG_LEVEL}
      - ELASTIC_APM_LOG_FORMAT_SOUT=${ELASTIC_APM_LOG_FORMAT_SOUT}
      - ELASTIC_APM_TRANSACTION_MAX_SPANS=${ELASTIC_APM_TRANSACTION_MAX_SPANS}
      - ELASTIC_APM_ENABLE_EXPERIMENTAL_INSTRUMENTATIONS=${ELASTIC_APM_ENABLE_EXPERIMENTAL_INSTRUMENTATIONS}
      - ELASTIC_APM_CAPTURE_BODY=${ELASTIC_APM_CAPTURE_BODY}
      - ELASTIC_APM_USE_PATH_AS_TRANSACTION_NAME=${ELASTIC_APM_USE_PATH_AS_TRANSACTION_NAME}
      - ELASTIC_APM_SPAN_COMPRESSION_ENABLED=${ELASTIC_APM_SPAN_COMPRESSION_ENABLED}
      - ELASTIC_APM_CAPTURE_JMX_METRICS=${ELASTIC_APM_CAPTURE_JMX_METRICS}
      - JVM_ARGS=${JVM_ARGS}
      - OKTA_ISSUER=${OKTA_ISSUER}
      - OKTA_CLIENT_ID=${OKTA_CLIENT_ID}
      - OKTA_CLIENT_SECRET=${OKTA_CLIENT_SECRET}
      - OKTA_REDIRECT_URI=${OKTA_REDIRECT_URI}
      # Artipie application secrets (used in artipie.yml)
      - JWT_SECRET=${JWT_SECRET}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./artipie/artipie.yml:/etc/artipie/artipie.yml
      - ./log4j2.xml:/etc/artipie/log4j2.xml
      - ./artipie/prod_repo:/var/artipie/repo
      - ./artipie/security:/var/artipie/security
      - ./artipie/data:/var/artipie/data
      - ./artipie/cache:/var/artipie/cache
      - ./artipie/cache/log:/var/artipie/logs/
      - ~/.aws:/home/.aws
    networks:
      - artipie-net
    #  - es
    ports:
      - "8086:8086"
      - "8087:8087"
      - "8088:8080"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - artipie
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - artipie-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    depends_on:
      artipie-db:
        condition: service_healthy
    command:
    - start-dev
    - --import-realm
    restart: unless-stopped
    environment:
      - KC_DB=${KC_DB}
      - KC_DB_URL=${KC_DB_URL}
      - KC_DB_USERNAME=${KC_DB_USERNAME}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME_STRICT=${KC_HOSTNAME_STRICT}
      - KC_HOSTNAME_STRICT_HTTPS=${KC_HOSTNAME_STRICT_HTTPS}
      - KC_HTTP_ENABLED=${KC_HTTP_ENABLED}
    ports:
      - "8080:8080"
    volumes:
    - ./keycloak-export:/opt/keycloak/data/import
    networks:
      - artipie-net

  artipie-db:
    image: postgres:17.8-alpine
    container_name: artipie-db
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "artifacts" ]
      interval: 10s
      timeout: 60s
      retries: 6

  valkey:
    image: valkey/valkey:8.1.4
    container_name: valkey
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "6379:6379"
    command:
      - valkey-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkey-data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - artipie

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - artipie-net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  artipie-net:
    driver: bridge
#  es:
#    external: true
#    name: 92_es

volumes:
  valkey-data:
  prometheus-data:
  grafana-data: