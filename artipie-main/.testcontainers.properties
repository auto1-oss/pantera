# Testcontainers configuration for cross-platform compatibility
testcontainers.reuse.enable=true
testcontainers.checks.disable=true

# Colima Docker socket configuration
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy
testcontainers.docker.socket.override=/var/run/docker.sock

# Disable Ryuk for Colima compatibility (resource cleanup will be manual)
testcontainers.ryuk.disabled=true
