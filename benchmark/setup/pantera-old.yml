meta:
  storage:
    type: fs
    path: /var/artipie/repo

  credentials:
    - type: env

  policy:
    type: local
    eviction_millis: 180000
    storage:
      type: fs
      path: /var/artipie/security

  artifacts_database:
    postgres_host: "postgres"
    postgres_port: 5432
    postgres_database: artifacts_old
    postgres_user: artipie
    postgres_password: artipie
    pool_max_size: 20
    pool_min_idle: 5

  http_client:
    proxy_timeout: 60
    max_connections_per_destination: 128
    max_requests_queued_per_destination: 512
    idle_timeout: 30000
    connection_timeout: 10000
    follow_redirects: true

  caches:
    valkey:
      enabled: true
      host: valkey
      port: 6379
      timeout: 100ms
    negative:
      ttl: 24h
      maxSize: 5000
