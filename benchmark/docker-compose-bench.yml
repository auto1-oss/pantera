##
## Pantera Benchmark Infrastructure
## Runs two Pantera instances (v1.20.12 and v1.22.0) side-by-side
## with shared PostgreSQL and Valkey for fair comparison.
##

services:
  # --- Shared Infrastructure ---
  postgres:
    image: postgres:17.8-alpine
    container_name: bench-postgres
    environment:
      POSTGRES_USER: pantera
      POSTGRES_PASSWORD: pantera
    volumes:
      - ./setup/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantera"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - bench-net
    tmpfs:
      - /var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8.1.4
    container_name: bench-valkey
    command:
      - valkey-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - bench-net

  # Upstream Docker registry for proxy tests
  upstream-registry:
    image: registry:2
    container_name: bench-upstream-registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    networks:
      - bench-net

  # Upstream NPM registry (Verdaccio) for proxy tests
  upstream-npm:
    image: verdaccio/verdaccio:6
    container_name: bench-upstream-npm
    networks:
      - bench-net

  # --- Pantera OLD (v1.20.12) ---
  pantera-old:
    image: ${PANTERA_OLD_IMAGE:-167967495118.dkr.ecr.eu-west-1.amazonaws.com/devops/pantera:1.20.12}
    container_name: bench-pantera-old
    # Run as root to avoid volume permission issues (benchmark only)
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      upstream-registry:
        condition: service_started
      upstream-npm:
        condition: service_started
    cpus: 4
    mem_limit: 8gb
    environment:
      - PANTERA_VERSION=1.20.12
      - PANTERA_USER_NAME=${PANTERA_USER_NAME:-pantera}
      - PANTERA_USER_PASS=${PANTERA_USER_PASS:-pantera}
      - LOG4J_CONFIGURATION_FILE=/etc/pantera/log4j2.xml
      - ELASTIC_APM_ENABLED=false
      - JVM_ARGS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Djava.io.tmpdir=/var/pantera/cache/tmp
    volumes:
      - ./setup/pantera-old.yml:/etc/pantera/pantera.yml
      - ./setup/repos-old:/var/pantera/repo
      - ./setup/security:/var/pantera/security
      - ./setup/log4j2-bench.xml:/etc/pantera/log4j2.xml
      - pantera-old-data:/var/pantera/data
      - pantera-old-cache:/var/pantera/cache
    ports:
      - "9081:8080"
      - "9082:8086"
    networks:
      - bench-net

  # --- Pantera NEW (v1.22.0) ---
  pantera-new:
    image: ${PANTERA_NEW_IMAGE:-167967495118.dkr.ecr.eu-west-1.amazonaws.com/devops/pantera:1.22.0}
    container_name: bench-pantera-new
    # Run as root to avoid volume permission issues (benchmark only)
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      upstream-registry:
        condition: service_started
      upstream-npm:
        condition: service_started
    cpus: 4
    mem_limit: 8gb
    environment:
      - PANTERA_VERSION=1.22.0
      - PANTERA_USER_NAME=${PANTERA_USER_NAME:-pantera}
      - PANTERA_USER_PASS=${PANTERA_USER_PASS:-pantera}
      - LOG4J_CONFIGURATION_FILE=/etc/pantera/log4j2.xml
      - ELASTIC_APM_ENABLED=false
      - JVM_ARGS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Djava.io.tmpdir=/var/pantera/cache/tmp
    volumes:
      - ./setup/pantera-new.yml:/etc/pantera/pantera.yml
      - ./setup/repos-new:/var/pantera/repo
      - ./setup/security:/var/pantera/security
      - ./setup/log4j2-bench.xml:/etc/pantera/log4j2.xml
      - pantera-new-data:/var/pantera/data
      - pantera-new-cache:/var/pantera/cache
    ports:
      - "9091:8080"
      - "9092:8086"
    networks:
      - bench-net

volumes:
  pantera-old-data:
  pantera-old-cache:
  pantera-new-data:
  pantera-new-cache:

networks:
  bench-net:
    driver: bridge
