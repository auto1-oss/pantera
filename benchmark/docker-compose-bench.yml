##
## Artipie Benchmark Infrastructure
## Runs two Artipie instances (v1.20.12 and v1.22.0) side-by-side
## with shared PostgreSQL and Valkey for fair comparison.
##

services:
  # --- Shared Infrastructure ---
  postgres:
    image: postgres:17.8-alpine
    container_name: bench-postgres
    environment:
      POSTGRES_USER: artipie
      POSTGRES_PASSWORD: artipie
    volumes:
      - ./setup/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artipie"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - bench-net
    tmpfs:
      - /var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8.1.4
    container_name: bench-valkey
    command:
      - valkey-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - bench-net

  # Upstream Docker registry for proxy tests
  upstream-registry:
    image: registry:2
    container_name: bench-upstream-registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    networks:
      - bench-net

  # Upstream NPM registry (Verdaccio) for proxy tests
  upstream-npm:
    image: verdaccio/verdaccio:6
    container_name: bench-upstream-npm
    networks:
      - bench-net

  # --- Artipie OLD (v1.20.12) ---
  artipie-old:
    image: ${ARTIPIE_OLD_IMAGE:-167967495118.dkr.ecr.eu-west-1.amazonaws.com/devops/artipie:1.20.12}
    container_name: bench-artipie-old
    # Run as root to avoid volume permission issues (benchmark only)
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      upstream-registry:
        condition: service_started
      upstream-npm:
        condition: service_started
    cpus: 4
    mem_limit: 8gb
    environment:
      - ARTIPIE_VERSION=1.20.12
      - ARTIPIE_USER_NAME=${ARTIPIE_USER_NAME:-artipie}
      - ARTIPIE_USER_PASS=${ARTIPIE_USER_PASS:-artipie}
      - LOG4J_CONFIGURATION_FILE=/etc/artipie/log4j2.xml
      - ELASTIC_APM_ENABLED=false
      - JVM_ARGS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Djava.io.tmpdir=/var/artipie/cache/tmp
    volumes:
      - ./setup/artipie-old.yml:/etc/artipie/artipie.yml
      - ./setup/repos-old:/var/artipie/repo
      - ./setup/security:/var/artipie/security
      - ./setup/log4j2-bench.xml:/etc/artipie/log4j2.xml
      - artipie-old-data:/var/artipie/data
      - artipie-old-cache:/var/artipie/cache
    ports:
      - "9081:8080"
      - "9082:8086"
    networks:
      - bench-net

  # --- Artipie NEW (v1.22.0) ---
  artipie-new:
    image: ${ARTIPIE_NEW_IMAGE:-167967495118.dkr.ecr.eu-west-1.amazonaws.com/devops/artipie:1.22.0}
    container_name: bench-artipie-new
    # Run as root to avoid volume permission issues (benchmark only)
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      upstream-registry:
        condition: service_started
      upstream-npm:
        condition: service_started
    cpus: 4
    mem_limit: 8gb
    environment:
      - ARTIPIE_VERSION=1.22.0
      - ARTIPIE_USER_NAME=${ARTIPIE_USER_NAME:-artipie}
      - ARTIPIE_USER_PASS=${ARTIPIE_USER_PASS:-artipie}
      - LOG4J_CONFIGURATION_FILE=/etc/artipie/log4j2.xml
      - ELASTIC_APM_ENABLED=false
      - JVM_ARGS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Djava.io.tmpdir=/var/artipie/cache/tmp
    volumes:
      - ./setup/artipie-new.yml:/etc/artipie/artipie.yml
      - ./setup/repos-new:/var/artipie/repo
      - ./setup/security:/var/artipie/security
      - ./setup/log4j2-bench.xml:/etc/artipie/log4j2.xml
      - artipie-new-data:/var/artipie/data
      - artipie-new-cache:/var/artipie/cache
    ports:
      - "9091:8080"
      - "9092:8086"
    networks:
      - bench-net

volumes:
  artipie-old-data:
  artipie-old-cache:
  artipie-new-data:
  artipie-new-cache:

networks:
  bench-net:
    driver: bridge
